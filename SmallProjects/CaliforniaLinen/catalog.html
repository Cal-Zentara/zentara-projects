<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Catalog — California Linen Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #122f4a;
      --yellow: #FFDE0A;
      --blue:   #1a5276;
      --light:  #f8f9fa;
      --border: #dee2e6;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOP BAR ── */
    .topbar {
      width: 100%;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.1);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-logo {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--navy);
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .topbar-logo span { color: #888; }
    .topbar-title {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
    }
    .topbar-back {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--navy);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    /* ── BOOK STAGE ── */
    .stage {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
      width: 100%;
    }

    .book-stage {
      position: relative;
      display: inline-block;
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 50;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #FFDE0A;
      border: none;
      color: #122f4a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.15s;
      user-select: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    #prevBtn { left: -24px; }
    #nextBtn { right: -24px; }
    .nav-btn:hover { background: #ffe633; transform: translateY(-50%) scale(1.1); }
    .nav-btn:active { transform: translateY(-50%) scale(0.95); }
    .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: translateY(-50%); }

    /* ── BOOK ── */
    #book {
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    }

    /* StPageFlip renders pages as .page divs — fill the page area */
    .page {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    /* ── PAGE CONTENT STYLES ── */
    .page-content {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    /* Cover */
    .cover {
      background: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 2.5rem;
      height: 100%;
    }
    .cover-state { font-size: 3.5rem; margin-bottom: 1rem; }
    .cover h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }
    .cover h1 span { color: var(--yellow); }
    .cover-sub {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 2rem;
    }
    .cover-rule {
      width: 40px;
      height: 2px;
      background: var(--yellow);
      margin: 0 auto 2rem;
    }
    .cover-tag {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
      line-height: 1.6;
    }
    .cover-phone {
      margin-top: 1.5rem;
      font-size: 1rem;
      font-weight: 700;
      color: var(--yellow);
      letter-spacing: 0.05em;
    }
    .cover-badge {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 1.5rem auto 0;
    }
    .cover-badge-inner {
      text-align: center;
    }
    .cover-badge-num {
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--yellow);
      line-height: 1;
    }
    .cover-badge-label {
      font-size: 0.48rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    /* Standard page layout */
    .pg {
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    .pg-header {
      background: var(--navy);
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .pg-chapter {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    .pg-section {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    .pg-body {
      flex: 1;
      padding: 1.5rem;
      overflow: hidden;
    }
    .pg-footer {
      padding: 0.5rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pg-num {
      font-size: 0.65rem;
      color: #aaa;
      font-weight: 600;
    }
    .pg-brand {
      font-size: 0.6rem;
      color: #bbb;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Section opener */
    .section-opener {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .section-opener-color {
      height: 55%;
    }
    .section-opener-photo {
      height: 55%;
      overflow: hidden;
    }
    .section-opener-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .section-opener-body {
      flex: 1;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .section-opener-num {
      font-size: 4rem;
      font-weight: 900;
      color: var(--border);
      line-height: 1;
      margin-bottom: 0.2rem;
    }
    .section-opener-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--navy);
      line-height: 1;
    }
    .section-opener-footer {
      padding: 0.5rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }

    /* TOC */
    .toc { height: 100%; padding: 1.5rem; }
    .toc h2 {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 1.2rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .toc-cat {
      margin-bottom: 1rem;
    }
    .toc-cat-title {
      font-size: 0.78rem;
      font-weight: 800;
      color: #fff;
      background: var(--navy);
      padding: 0.25rem 0.5rem;
      margin-bottom: 0.3rem;
      display: inline-block;
    }
    .toc-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 0.72rem;
      color: #555;
      padding: 0.15rem 0.5rem;
    }
    .toc-item-name { font-weight: 500; }
    .toc-item-dots {
      flex: 1;
      margin: 0 0.4rem;
      border-bottom: 1px dotted #ccc;
      height: 0.8em;
    }
    .toc-item-pg { font-weight: 700; color: var(--navy); }
    .toc-sub {
      font-size: 0.66rem;
      color: #888;
      padding: 0.1rem 1.5rem;
      display: flex;
      justify-content: space-between;
    }
    .toc-sub-dots {
      flex: 1;
      margin: 0 0.4rem;
      border-bottom: 1px dotted #ddd;
      height: 0.8em;
    }

    /* Product listing */
    .product-list { display: flex; flex-direction: column; gap: 1rem; }
    .product-item {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .product-item:last-child { border-bottom: none; }
    .product-item-img {
      width: 100px;
      height: 110px;
      background: #f5f5f5;
      border: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .product-item-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .product-item-info h3 {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 0.3rem;
    }
    .product-item-info p {
      font-size: 0.68rem;
      color: #555;
      line-height: 1.5;
      margin-bottom: 0.3rem;
    }
    .product-item-info .spec {
      font-size: 0.62rem;
      color: #888;
      line-height: 1.4;
    }

    /* 2-col product grid on a page */
    .product-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      height: 100%;
    }
    .product-cell {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .product-cell:last-child { border-bottom: none; }
    .product-cell-img {
      width: 100%;
      height: 130px;
      background: #f8f8f8;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .product-cell-img img {
      max-width: 85%;
      max-height: 85%;
      object-fit: contain;
    }
    .product-cell h3 {
      font-size: 0.7rem;
      font-weight: 800;
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .product-cell p {
      font-size: 0.63rem;
      color: #666;
      line-height: 1.45;
    }

    /* Colors page */
    .colors-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 0.2rem;
    }
    .colors-sub {
      font-size: 0.68rem;
      color: #888;
      margin-bottom: 1rem;
    }
    .colors-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.4rem;
    }
    .color-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.2rem 0;
    }
    .color-swatch {
      width: 28px;
      height: 20px;
      border: 1px solid rgba(0,0,0,0.1);
      flex-shrink: 0;
    }
    .color-name {
      font-size: 0.65rem;
      color: #444;
      font-weight: 500;
    }

    /* Specs table */
    .specs-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 0.8rem;
    }
    .specs-intro {
      font-size: 0.68rem;
      color: #555;
      line-height: 1.5;
      margin-bottom: 1rem;
    }
    .specs-intro strong { color: var(--blue); }
    .size-grid { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
    .size-row {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .size-label {
      font-size: 0.68rem;
      font-weight: 700;
      color: #333;
      width: 80px;
    }
    .size-box {
      border: 1px solid #999;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Blank page (back of cover etc.) */
    .blank { height: 100%; background: #fff; }

    /* Company page */
    .company-pg {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .company-img {
      height: 220px;
      overflow: hidden;
    }
    .company-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .company-body {
      flex: 1;
      padding: 1.2rem 1.5rem;
    }
    .company-body h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 0.6rem;
    }
    .company-body p {
      font-size: 0.68rem;
      color: #555;
      line-height: 1.6;
      margin-bottom: 0.6rem;
    }
    .company-footer {
      padding: 0.5rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      color: #aaa;
    }

    /* Page counter UI */
    .page-indicator {
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      font-weight: 600;
      text-align: center;
      margin-top: 1rem;
      letter-spacing: 0.05em;
    }

    /* Responsive */
    @media (max-width: 760px) {
      .stage { gap: 0.5rem; padding: 1.5rem 0.5rem; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a href="index.html" class="topbar-logo">California<span>Linen</span></a>
  <div class="topbar-title">Product Catalog</div>
  <a href="index.html" class="topbar-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to Site

</div>

<!-- BOOK STAGE -->
<div class="stage">
  <div class="book-stage">
    <button class="nav-btn" id="prevBtn" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>

</div>

// ── STPAGEFLIP ENGINE ─────────────────────────────────────────────────

// Build page elements from PAGES array and inject into #book
const bookEl = document.getElementById('book');
PAGES.forEach(html => {
  const div = document.createElement('div');
  div.className = 'page';
  div.innerHTML = html;
  bookEl.appendChild(div);
});

// Init StPageFlip
const pageFlip = new St.PageFlip(bookEl, {
  width: 450,
  height: 600,
  size: 'fixed',
  drawShadow: true,
  flippingTime: 1000,
  showCover: false,
  usePortrait: false,
  useMouseEvents: true,
  swipeDistance: 30,
  mobileScrollSupport: false,
  maxShadowOpacity: 0.6,
  startZIndex: 0,
  autoSize: false,
});

pageFlip.loadFromHTML(bookEl.querySelectorAll('.page'));

// Controls
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const indicator = document.getElementById('pageIndicator');

prevBtn.addEventListener('click', () => pageFlip.flipPrev('bottom'));
nextBtn.addEventListener('click', () => pageFlip.flipNext('bottom'));

function updateControls() {
  const cur   = pageFlip.getCurrentPageIndex();
  const total = pageFlip.getPageCount();
  prevBtn.disabled = cur === 0;
  nextBtn.disabled = cur >= total - 2;
  if (cur === 0) {
    indicator.textContent = 'Cover  ·  1 / ' + Math.ceil(total / 2);
  } else if (cur >= total - 1) {
    indicator.textContent = 'Back Cover  ·  ' + Math.ceil(total / 2) + ' / ' + Math.ceil(total / 2);
  } else {
    indicator.textContent = `Pages ${cur}–${cur + 1}  ·  ${Math.ceil(cur / 2) + 1} / ${Math.ceil(total / 2)}`;
  }
}

pageFlip.on('flip', updateControls);
pageFlip.on('init', updateControls);

// Keyboard nav
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') pageFlip.flipNext('bottom');
  if (e.key === 'ArrowLeft')  pageFlip.flipPrev('bottom');
});
</script>
