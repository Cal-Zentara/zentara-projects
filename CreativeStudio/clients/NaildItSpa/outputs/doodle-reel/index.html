<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#111;}
  #stage{position:relative;width:1080px;height:1920px;overflow:hidden;background:#F9EDE8;}
  .scene{position:absolute;inset:0;display:none;}
  .photobox{position:absolute;inset:0;overflow:hidden;}
  .photobox img{position:absolute;left:50%;top:50%;}
  .ph{transform-origin:center center;}
  svg.overlay{position:absolute;inset:0;width:1080px;height:1920px;pointer-events:none;}
  .lbl{position:absolute;font-family:'Caveat',cursive;font-weight:700;line-height:1.05;
       text-shadow:0 2px 14px rgba(0,0,0,.35);transform-origin:center center;white-space:nowrap;}
  .lbl.light{color:#fff;}
  .lbl.gold{color:#E8C97A;}
  .lbl.terra{color:#C4714F;text-shadow:0 2px 10px rgba(255,255,255,.55);}
  .doodle{transform-origin:center center;}
  /* end card */
  #endcard{background:#F9EDE8;}
  .ec-logo{position:absolute;left:50%;top:430px;width:330px;height:330px;border-radius:50%;
           overflow:hidden;box-shadow:0 18px 50px rgba(160,80,56,.18);transform-origin:center center;}
  .ec-logo img{width:100%;height:100%;object-fit:cover;}
  .ec-kicker{position:absolute;left:0;right:0;top:860px;text-align:center;font-family:'Playfair Display',serif;
             font-size:30px;letter-spacing:10px;color:#C9A24A;font-weight:600;}
  .ec-name{position:absolute;left:0;right:0;top:915px;text-align:center;font-family:'Playfair Display',serif;
           font-size:108px;color:#A05038;font-weight:700;}
  .ec-name em{font-style:italic;color:#C4714F;}
  .ec-walk{position:absolute;left:0;right:0;top:1090px;text-align:center;font-family:'Caveat',cursive;
           font-size:58px;color:#6B4A3A;font-weight:600;}
  .ec-site{position:absolute;left:0;right:0;top:1210px;text-align:center;font-family:'Playfair Display',serif;
           font-size:40px;color:#C4714F;letter-spacing:2px;}
</style>
</head>
<body>
<div id="stage">

  <!-- SCENE 1 : chrome pearl + 3D flowers -->
  <div class="scene" id="s1">
    <div class="photobox"><img id="ph1" class="ph" src="photo1.jpeg"></div>
    <svg class="overlay" viewBox="0 0 1080 1920">
      <!-- squiggle underline under hook -->
      <path id="s1-under" class="doodle" data-seed="11" d="M 250 360 q 60 -26 120 0 t 120 0 t 120 0 t 120 0"
            fill="none" stroke="#E8C97A" stroke-width="9" stroke-linecap="round"/>
      <!-- wiggly arrow to the big 3D flower -->
      <path id="s1-arrow" class="doodle" data-seed="12" d="M 160 800 q 120 140 250 150 q 90 8 130 60"
            fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
      <path id="s1-arrowhead" class="doodle" data-seed="13" d="M 505 950 l 45 65 l -80 6"
            fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- circle around the crystals on the lower left nail -->
      <ellipse id="s1-circle" class="doodle" data-seed="14" cx="195" cy="1355" rx="115" ry="82"
            fill="none" stroke="#E8C97A" stroke-width="9" transform="rotate(-8 195 1355)"/>
      <!-- sparkles -->
      <g id="s1-sp1" class="doodle spark" data-seed="15"><path d="M 200 560 l 0 -46 M 200 560 l 0 46 M 200 560 l -34 0 M 200 560 l 34 0" stroke="#fff" stroke-width="8" stroke-linecap="round"/></g>
      <g id="s1-sp2" class="doodle spark" data-seed="16"><path d="M 900 480 l 0 -38 M 900 480 l 0 38 M 900 480 l -28 0 M 900 480 l 28 0" stroke="#E8C97A" stroke-width="7" stroke-linecap="round"/></g>
      <g id="s1-sp3" class="doodle spark" data-seed="17"><path d="M 870 1380 l 0 -44 M 870 1380 l 0 44 M 870 1380 l -32 0 M 870 1380 l 32 0" stroke="#fff" stroke-width="8" stroke-linecap="round"/></g>
      <g id="s1-sp4" class="doodle spark" data-seed="18"><path d="M 470 1700 l 0 -36 M 470 1700 l 0 36 M 470 1700 l -26 0 M 470 1700 l 26 0" stroke="#E8C97A" stroke-width="7" stroke-linecap="round"/></g>
    </svg>
    <div class="lbl light" id="s1-hook"  style="left:140px;top:250px;font-size:96px;transform:rotate(-3deg);">fresh out of the chair</div>
    <div class="lbl light" id="s1-l1"    style="left:90px;top:690px;font-size:64px;transform:rotate(-5deg);">real 3D flowers</div>
    <div class="lbl light" id="s1-l2"    style="left:330px;top:1320px;font-size:56px;transform:rotate(4deg);">hand placed crystals</div>
  </div>

  <!-- SCENE 2 : milky lip gloss nails + bows -->
  <div class="scene" id="s2">
    <div class="photobox"><img id="ph2" class="ph" src="photo2.jpeg"></div>
    <svg class="overlay" viewBox="0 0 1080 1920">
      <!-- arrow to the bow -->
      <path id="s2-arrow" class="doodle" data-seed="21" d="M 860 760 q -80 110 -210 150 q -70 22 -100 70"
            fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
      <path id="s2-arrowhead" class="doodle" data-seed="22" d="M 575 925 l -28 72 l 82 -14"
            fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- hand drawn bow doodle floating top left -->
      <g id="s2-bow" class="doodle" data-seed="23">
        <path d="M 200 520 q -60 -50 -98 -6 q -28 36 28 56 q 40 12 70 -50 z M 200 520 q 60 -50 98 -6 q 28 36 -28 56 q -40 12 -70 -50 z M 200 520 l -22 76 M 200 520 l 26 74"
              fill="none" stroke="#E8C97A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <!-- hearts -->
      <g id="s2-h1" class="doodle spark" data-seed="24"><path d="M 880 1300 c -10 -26 -50 -22 -50 8 c 0 22 30 38 50 54 c 20 -16 50 -32 50 -54 c 0 -30 -40 -34 -50 -8 z" fill="none" stroke="#C4714F" stroke-width="8"/></g>
      <g id="s2-h2" class="doodle spark" data-seed="25"><path d="M 180 1180 c -8 -20 -40 -17 -40 6 c 0 17 24 30 40 43 c 16 -13 40 -26 40 -43 c 0 -23 -32 -26 -40 -6 z" fill="none" stroke="#E8C97A" stroke-width="7"/></g>
      <g id="s2-sp1" class="doodle spark" data-seed="26"><path d="M 930 560 l 0 -40 M 930 560 l 0 40 M 930 560 l -30 0 M 930 560 l 30 0" stroke="#C9A24A" stroke-width="7" stroke-linecap="round"/></g>
      <g id="s2-sp2" class="doodle spark" data-seed="27"><path d="M 140 880 l 0 -34 M 140 880 l 0 34 M 140 880 l -24 0 M 140 880 l 24 0" stroke="#C4714F" stroke-width="7" stroke-linecap="round"/></g>
    </svg>
    <div class="lbl light" id="s2-hook" style="left:110px;top:255px;font-size:88px;transform:rotate(-3deg);">glossier than your lip gloss</div>
    <div class="lbl light" id="s2-l1"   style="left:620px;top:680px;font-size:62px;transform:rotate(4deg);">those bows tho</div>
    <div class="lbl light" id="s2-l2"   style="left:120px;top:1470px;font-size:58px;transform:rotate(-2deg);">the milky set everyone asks for</div>
  </div>

  <!-- SCENE 3 : gold chrome stilettos -->
  <div class="scene" id="s3">
    <div class="photobox"><img id="ph3" class="ph" src="photo3.jpeg"></div>
    <svg class="overlay" viewBox="0 0 1080 1920">
      <!-- crown above the upward stiletto tips of the lower hand -->
      <g id="s3-crown" class="doodle" data-seed="31">
        <path d="M 470 1130 l 22 -70 l 40 50 l 36 -76 l 36 76 l 40 -50 l 22 70 z M 470 1130 l 196 0"
              fill="none" stroke="#E8C97A" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <!-- glint marks near the chrome nails -->
      <path id="s3-zig1" class="doodle" data-seed="32" d="M 836 444 l 30 -44 M 796 420 l 44 -30 M 860 472 l 48 -22"
            fill="none" stroke="#E8C97A" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      <path id="s3-zig2" class="doodle" data-seed="33" d="M 250 1056 l 28 -40 M 214 1034 l 40 -28 M 272 1082 l 44 -20"
            fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <g id="s3-sp1" class="doodle spark" data-seed="34"><path d="M 900 720 l 0 -44 M 900 720 l 0 44 M 900 720 l -32 0 M 900 720 l 32 0" stroke="#E8C97A" stroke-width="8" stroke-linecap="round"/></g>
      <g id="s3-sp2" class="doodle spark" data-seed="35"><path d="M 150 760 l 0 -40 M 150 760 l 0 40 M 150 760 l -28 0 M 150 760 l 28 0" stroke="#fff" stroke-width="7" stroke-linecap="round"/></g>
      <g id="s3-sp3" class="doodle spark" data-seed="36"><path d="M 820 1560 l 0 -38 M 820 1560 l 0 38 M 820 1560 l -28 0 M 820 1560 l 28 0" stroke="#C4714F" stroke-width="7" stroke-linecap="round"/></g>
    </svg>
    <div class="lbl light" id="s3-hook" style="left:140px;top:1430px;font-size:92px;transform:rotate(-3deg);">the glazed donut set</div>
    <div class="lbl light" id="s3-l1"   style="left:580px;top:1580px;font-size:56px;transform:rotate(2deg);">in person it glows</div>
  </div>

  <!-- END CARD -->
  <div class="scene" id="endcard">
    <svg class="overlay" viewBox="0 0 1080 1920">
      <g id="ec-sp1" class="doodle spark" data-seed="41"><path d="M 260 420 l 0 -48 M 260 420 l 0 48 M 260 420 l -36 0 M 260 420 l 36 0" stroke="#C9A24A" stroke-width="8" stroke-linecap="round"/></g>
      <g id="ec-sp2" class="doodle spark" data-seed="42"><path d="M 830 380 l 0 -40 M 830 380 l 0 40 M 830 380 l -30 0 M 830 380 l 30 0" stroke="#C4714F" stroke-width="7" stroke-linecap="round"/></g>
      <g id="ec-sp3" class="doodle spark" data-seed="43"><path d="M 880 1400 l 0 -44 M 880 1400 l 0 44 M 880 1400 l -32 0 M 880 1400 l 32 0" stroke="#C9A24A" stroke-width="8" stroke-linecap="round"/></g>
      <g id="ec-sp4" class="doodle spark" data-seed="44"><path d="M 200 1450 l 0 -38 M 200 1450 l 0 38 M 200 1450 l -28 0 M 200 1450 l 28 0" stroke="#C4714F" stroke-width="7" stroke-linecap="round"/></g>
      <path id="ec-under" class="doodle" data-seed="45" d="M 330 1180 q 55 -22 110 0 t 110 0 t 110 0 t 110 0"
            fill="none" stroke="#C9A24A" stroke-width="8" stroke-linecap="round"/>
    </svg>
    <div class="ec-logo" id="ec-logo"><img src="logo.jpeg"></div>
    <div class="ec-kicker" id="ec-kicker">STANTON · OPEN 7 DAYS</div>
    <div class="ec-name" id="ec-name">Nail'd <em>It!</em> Spa</div>
    <div class="ec-walk" id="ec-walk">walk ins always welcome</div>
    <div class="ec-site" id="ec-site">nailditspa.com</div>
  </div>

</div>

<script>
const SCENES = [
  {id:'s1', start:0,    end:4.5},
  {id:'s2', start:4.5,  end:9},
  {id:'s3', start:9,    end:13.5},
  {id:'endcard', start:13.5, end:16},
];
const DUR = 16;

// deterministic pseudo random from seed + frame
function prand(seed, fi, k){ const x = Math.sin(seed*127.1 + fi*311.7 + k*74.7)*43758.5453; return x - Math.floor(x); }
// boil jitter transform for doodles (8 fps boil)
function boil(seed, t, amp){ const fi = Math.floor(t*8);
  const dx = (prand(seed,fi,1)-.5)*2*amp, dy = (prand(seed,fi,2)-.5)*2*amp, dr = (prand(seed,fi,3)-.5)*3;
  return 'translate('+dx.toFixed(2)+'px,'+dy.toFixed(2)+'px) rotate('+dr.toFixed(2)+'deg)'; }
// pop in with overshoot, starting at tIn (scene local), 0.45s long
function popScale(p){ if(p<=0) return 0; if(p>=1) return 1; const o=1.7; const q=p; return 1 + (o*Math.pow(q-1,3) + (o-1)*Math.pow(q-1,2)) ; }
function popAt(localT, tIn){ return popScale(Math.min(Math.max((localT - tIn)/0.45, 0), 1)); }
// stroke draw-in
function drawPath(el, prog){ const len = el.getTotalLength(); el.style.strokeDasharray = len; el.style.strokeDashoffset = String(len*(1-Math.min(Math.max(prog,0),1))); }
// sparkle pulse: pops in at tIn then gently pulses
function sparkScale(localT, tIn, seed){ const base = popAt(localT, tIn); if(base<=0) return 0;
  const pulse = 1 + 0.14*Math.sin((localT-tIn)*5 + seed); return base*pulse; }

// photo zoom settings
const PH = {
  ph1:{nw:659, nh:812, rot:0},
  ph2:{nw:525, nh:736, rot:0},
  ph3:{nw:654, nh:886, rot:0},
};
function fitPhoto(id, p){ // p = scene progress 0..1
  const c = PH[id]; const el = document.getElementById(id);
  let baseW, baseH;
  if(c.rot!==0){ // rotated: displayed width becomes height
    // scale so rotated bbox covers 1080x1920
    const s = Math.max(1920/c.nw, 1080/c.nh);
    baseW = c.nw*s; baseH = c.nh*s;
  } else {
    const s = Math.max(1080/c.nw, 1920/c.nh);
    baseW = c.nw*s; baseH = c.nh*s;
  }
  el.style.width = baseW+'px'; el.style.height = baseH+'px';
  const zoom = 1.04 + 0.09*p;
  el.style.transform = 'translate(-50%,-50%) rotate('+c.rot+'deg) scale('+zoom+')';
}

// label pop helper
function popLabel(id, localT, tIn, rot){ const el = document.getElementById(id);
  const s = popAt(localT, tIn);
  el.style.opacity = s<=0 ? 0 : 1;
  el.style.transform = 'rotate('+rot+'deg) scale('+Math.max(s,0.001)+')'; }

window.renderFrame = function(t){
  t = Math.min(Math.max(t,0), DUR-0.001);
  let active = null, localT = 0, p = 0;
  for(const sc of SCENES){
    const el = document.getElementById(sc.id);
    const on = t>=sc.start && t<sc.end;
    el.style.display = on ? 'block' : 'none';
    if(on){ active = sc.id; localT = t - sc.start; p = localT/(sc.end-sc.start); }
  }
  // boil all visible doodles
  document.querySelectorAll('.scene').forEach(sc=>{
    if(sc.style.display==='none') return;
    sc.querySelectorAll('.doodle').forEach(d=>{
      const seed = parseFloat(d.dataset.seed||'7');
      d.style.transform = (d.getAttribute('data-basetransform')||'') + ' ' + boil(seed, t, 3.5);
    });
  });

  if(active==='s1'){
    fitPhoto('ph1', p);
    popLabel('s1-hook', localT, 0.25, -3);
    drawPath(document.getElementById('s1-under'),  (localT-0.55)/0.5);
    drawPath(document.getElementById('s1-arrow'),  (localT-1.1)/0.6);
    drawPath(document.getElementById('s1-arrowhead'), (localT-1.6)/0.3);
    popLabel('s1-l1', localT, 1.15, -5);
    drawPath(document.getElementById('s1-circle'), (localT-2.1)/0.6);
    popLabel('s1-l2', localT, 2.3, 4);
    [['s1-sp1',0.7],['s1-sp2',1.5],['s1-sp3',2.6],['s1-sp4',3.2]].forEach(([id,tin],i)=>{
      const el=document.getElementById(id); const s=sparkScale(localT,tin,i*2);
      el.style.opacity = s<=0?0:1;
      el.setAttribute('transform','translate(0 0)');
      el.style.transformOrigin='center'; el.style.transformBox='fill-box';
      el.style.transform = 'scale('+Math.max(s,0.001)+') ' + boil(20+i, t, 2);
    });
  }
  if(active==='s2'){
    fitPhoto('ph2', p);
    popLabel('s2-hook', localT, 0.25, -3);
    drawPath(document.getElementById('s2-arrow'), (localT-0.9)/0.6);
    drawPath(document.getElementById('s2-arrowhead'), (localT-1.4)/0.3);
    popLabel('s2-l1', localT, 0.95, 4);
    const bow = document.getElementById('s2-bow');
    const bs = popAt(localT, 1.8);
    bow.style.opacity = bs<=0?0:1; bow.style.transformOrigin='center'; bow.style.transformBox='fill-box';
    bow.style.transform = 'scale('+Math.max(bs,0.001)+') ' + boil(23, t, 3);
    popLabel('s2-l2', localT, 2.5, -2);
    [['s2-h1',2.0],['s2-h2',2.8],['s2-sp1',0.7],['s2-sp2',3.1]].forEach(([id,tin],i)=>{
      const el=document.getElementById(id); const s=sparkScale(localT,tin,i*3);
      el.style.opacity = s<=0?0:1; el.style.transformOrigin='center'; el.style.transformBox='fill-box';
      el.style.transform = 'scale('+Math.max(s,0.001)+') ' + boil(30+i, t, 2);
    });
  }
  if(active==='s3'){
    fitPhoto('ph3', p);
    popLabel('s3-hook', localT, 0.3, -3);
    const crown=document.getElementById('s3-crown');
    const cs=popAt(localT,1.0);
    crown.style.opacity=cs<=0?0:1; crown.style.transformOrigin='center'; crown.style.transformBox='fill-box';
    crown.style.transform='scale('+Math.max(cs,0.001)+') '+boil(31,t,3);
    drawPath(document.getElementById('s3-zig1'), (localT-1.5)/0.4);
    drawPath(document.getElementById('s3-zig2'), (localT-1.9)/0.4);
    popLabel('s3-l1', localT, 2.4, 2);
    [['s3-sp1',0.8],['s3-sp2',1.7],['s3-sp3',2.9]].forEach(([id,tin],i)=>{
      const el=document.getElementById(id); const s=sparkScale(localT,tin,i*2);
      el.style.opacity = s<=0?0:1; el.style.transformOrigin='center'; el.style.transformBox='fill-box';
      el.style.transform = 'scale('+Math.max(s,0.001)+') ' + boil(40+i, t, 2);
    });
  }
  if(active==='endcard'){
    const lg=document.getElementById('ec-logo');
    const ls=popAt(localT,0.15);
    lg.style.opacity=ls<=0?0:1;
    lg.style.transform='translateX(-50%) scale('+Math.max(ls,0.001)+')';
    popLabel('ec-kicker', localT, 0.5, 0);
    popLabel('ec-name', localT, 0.65, 0);
    drawPath(document.getElementById('ec-under'), (localT-1.0)/0.5);
    popLabel('ec-walk', localT, 1.15, 0);
    popLabel('ec-site', localT, 1.35, 0);
    [['ec-sp1',0.4],['ec-sp2',0.9],['ec-sp3',1.3],['ec-sp4',1.6]].forEach(([id,tin],i)=>{
      const el=document.getElementById(id); const s=sparkScale(localT,tin,i*2);
      el.style.opacity = s<=0?0:1; el.style.transformOrigin='center'; el.style.transformBox='fill-box';
      el.style.transform = 'scale('+Math.max(s,0.001)+') ' + boil(50+i, t, 2.5);
    });
  }
};
// initial state
renderFrame(0);
</script>
</body>
</html>
